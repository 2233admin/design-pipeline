name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  qa-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Hermetic QA
        run: node scripts/qa.cjs

      - name: Package
        run: node scripts/package.cjs --output-root dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: design-pipeline-skill
          path: |
            dist/design-pipeline-skill.tgz
            dist/design-pipeline-skill.zip
            dist/checksums.txt
          if-no-files-found: error
