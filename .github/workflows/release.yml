name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version label (without v)"
        required: true
        default: "0.0.0"

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: QA
        run: node scripts/qa.cjs
        env:
          PACKAGE_VERSION: ${{ steps.ver.outputs.version }}

      - name: Package
        run: node scripts/package.cjs --output-root dist
        env:
          PACKAGE_VERSION: ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: design-pipeline v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/design-pipeline-skill.tgz
            dist/design-pipeline-skill.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
