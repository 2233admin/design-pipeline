name: Pipeline observation
description: Report a design-pipeline bug, companion gap, or missing capability.
title: "[pipeline] "
labels:
  - pipeline-observation
body:
  - type: markdown
    attributes:
      value: |
        Remove private paths, credentials, authenticated URLs, and proprietary source before submitting.
  - type: dropdown
    id: kind
    attributes:
      label: Observation kind
      options:
        - Pipeline bug
        - Companion gap
        - Capability gap
        - Quality gap
        - Documentation gap
        - Feature request
    validations:
      required: true
  - type: input
    id: observation
    attributes:
      label: Local observation id
      description: Optional dpf-* id generated by record-feedback.cjs.
      placeholder: dpf-0123456789abcdef
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, what was expected, and why it affects a design outcome.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproducible evidence
      description: Include commands, capability markers, or QA evidence after redaction.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Upstream capability source
      description: Official documentation or maintained skill source when compatibility is involved.
  - type: textarea
    id: fallback
    attributes:
      label: Current fallback
      description: How the pipeline continued safely, or why it had to block.
